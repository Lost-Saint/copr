---
name: trigger package copr builds
on:
  push:
    branches: [main]
    paths:
      - "**/*.spec"
      - ".github/spec-build-targets.json"
      - ".forgejo/workflows/trigger-copr-builds.yaml"
  workflow_dispatch:
    inputs:
      # checkov:skip=CKV_GHA_7:arg passed to env and validated before use
      spec_file:
        description: "Spec file to build (format: project/package.spec)"
        required: false
        type: string
      # checkov:skip=CKV_GHA_7:arg passed to env and validated before use
      fedora_versions:
        description: "Optional Fedora versions to build, space or comma separated"
        required: false
        type: string
permissions: {}
env:
  COPR_OWNER: myriad-sun
jobs:
  matrix_from_changed_specs:
    runs-on: codeberg-small
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.matrix_from_changed_spec_files.outputs.matrix }}
    steps:
      - uses: https://data.forgejo.org/actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Get changed spec files
        id: changed_specs
        run: |
          set -euo pipefail
          output_file="${GITHUB_OUTPUT:-${FORGEJO_OUTPUT:?}}"

          if [ "${FORGEJO_EVENT_NAME:-${GITHUB_EVENT_NAME:-}}" = "workflow_dispatch" ]; then
            changed_files=""
          else
            event_path="${FORGEJO_EVENT_PATH:-${GITHUB_EVENT_PATH:?}}"
            before="$(jq -r '.before // empty' "$event_path")"
            after="${FORGEJO_SHA:-${GITHUB_SHA:?}}"
            if [ -n "$before" ] && ! [[ "$before" =~ ^0+$ ]]; then
              changed_files="$(git diff --name-only "$before" "$after" -- \
                '**/*.spec' \
                '.github/spec-build-targets.json' \
                '.forgejo/workflows/trigger-copr-builds.yaml' || true)"
            else
              changed_files="$(git diff-tree --no-commit-id --name-only -r "$after" -- \
                '**/*.spec' \
                '.github/spec-build-targets.json' \
                '.forgejo/workflows/trigger-copr-builds.yaml' || true)"
            fi
          fi

          {
            echo "all_changed_files<<EOF"
            printf '%s\n' "$changed_files"
            echo "EOF"
          } >> "$output_file"
      - name: Create package matrix
        id: matrix_from_changed_spec_files
        # yamllint disable rule:line-length
        env:
          MANUAL_SPEC_FILE: ${{ inputs.spec_file }}
          MANUAL_FEDORA_VERSIONS_INPUT: ${{ inputs.fedora_versions }}
          CHANGED_FILES: ${{ steps.changed_specs.outputs.all_changed_files }}
        run: |
          set -euo pipefail
          output_file="${GITHUB_OUTPUT:-${FORGEJO_OUTPUT:?}}"
          BUILD_TARGETS_JSON=$(jq -c . .github/spec-build-targets.json)
          FEDORA_VERSIONS=$(jq -r '.default_fedora_versions | join(" ")' <<< "$BUILD_TARGETS_JSON")
          SPEC_FEDORA_VERSIONS_JSON=$(jq -c '.spec_overrides' <<< "$BUILD_TARGETS_JSON")
          ALL_SPECS=$(git ls-files '*.spec')
          INCLUDE_ARRAY='[]'
          # used to ensure unique spec file paths, newline-separated
          SEEN_SPEC_FILES=""

          # Check if manual spec file was provided via workflow_dispatch
          MANUAL_FEDORA_VERSIONS="$(tr ',' ' ' <<< "${MANUAL_FEDORA_VERSIONS_INPUT}")"
          BUILD_ALL_SPECS=false

          if [ -n "${MANUAL_SPEC_FILE}" ] && ! [[ "${MANUAL_SPEC_FILE}" =~ ^[A-Za-z0-9._/-]+\.spec$ ]]; then
            echo "::error::Invalid spec file path: ${MANUAL_SPEC_FILE}"
            exit 1
          fi
          for MANUAL_FEDORA_VERSION in ${MANUAL_FEDORA_VERSIONS}; do
            if ! [[ "$MANUAL_FEDORA_VERSION" =~ ^[0-9]+$ ]]; then
              echo "::error::Invalid Fedora version: ${MANUAL_FEDORA_VERSION}"
              exit 1
            fi
          done

          for CHANGED_FILE in ${CHANGED_FILES}; do
            case "$CHANGED_FILE" in
              .github/spec-build-targets.json|.forgejo/workflows/trigger-copr-builds.yaml)
                BUILD_ALL_SPECS=true
                ;;
            esac
          done

          if [ -n "${MANUAL_SPEC_FILE}" ]; then
            echo "::notice::Using manually specified spec file: ${MANUAL_SPEC_FILE}"
            # Use the manually specified spec file instead of changed files
            SPEC_FILES="${MANUAL_SPEC_FILE}"
          elif [ "$BUILD_ALL_SPECS" = true ]; then
            SPEC_FILES="${ALL_SPECS}"
          else
            # Use the detected changed files
            SPEC_FILES="${CHANGED_FILES}"
          fi

          for COPR_SPEC_FILE in ${SPEC_FILES}; do
            # Skip if spec_file is empty (e.g. if there were extra spaces in the input)
            if [ -z "$COPR_SPEC_FILE" ]; then
              continue
            fi
            if ! [[ "$COPR_SPEC_FILE" =~ ^[A-Za-z0-9._/-]+\.spec$ ]]; then
              echo "::error file=$COPR_SPEC_FILE::Spec file path contains unsupported characters"
              exit 1
            fi
            if [ ! -f "$COPR_SPEC_FILE" ]; then
              echo "::error file=$COPR_SPEC_FILE::Spec file does not exist"
              exit 1
            fi

            if echo "${SEEN_SPEC_FILES}" | grep -qxF "$COPR_SPEC_FILE"; then
              continue
            fi

            SEEN_SPEC_FILES="${SEEN_SPEC_FILES}${COPR_SPEC_FILE}"$'\n'

            COPR_PROJECT="$(dirname "$COPR_SPEC_FILE")"
            # Remove potential ./ prefix if present
            #   (e.g. if find results included it)
            COPR_PROJECT="${COPR_PROJECT#./}"
            if ! [[ "$COPR_PROJECT" =~ ^[A-Za-z0-9._/-]+$ ]]; then
              echo "::error file=$COPR_SPEC_FILE::Project path contains unsupported characters"
              exit 1
            fi

            # Extract package name from the 'Name:' field in the spec file
            # Using grep -Po for Perl-compatible regex to get only the matched
            # group. Assumes 'Name:' is at the beginning of a line.
            COPR_PACKAGE_NAME="$(grep -Po '^Name:\s*\K[^[:space:]]+' "$COPR_SPEC_FILE")"

            if [ -z "${COPR_PACKAGE_NAME}" ]; then
              echo "::warning file=$COPR_SPEC_FILE::Could not extract package name from $COPR_SPEC_FILE"
              continue # Skip this file if package name couldn't be extracted
            fi
            if ! [[ "$COPR_PACKAGE_NAME" =~ ^[A-Za-z0-9._+-]+$ ]]; then
              echo "::error file=$COPR_SPEC_FILE::Package name contains unsupported characters"
              exit 1
            fi

            FEDORA_BUILD_VERSIONS="$FEDORA_VERSIONS"
            OVERRIDE_VERSIONS=$(jq -r --arg spec "$COPR_SPEC_FILE" '.[$spec] // empty | join(" ")' <<< "$SPEC_FEDORA_VERSIONS_JSON")
            if [ -n "$OVERRIDE_VERSIONS" ]; then
              FEDORA_BUILD_VERSIONS="$OVERRIDE_VERSIONS"
            fi
            CONFIGURED_FEDORA_BUILD_VERSIONS="$FEDORA_BUILD_VERSIONS"
            if [ -n "$MANUAL_FEDORA_VERSIONS" ]; then
              FEDORA_BUILD_VERSIONS="$MANUAL_FEDORA_VERSIONS"
            fi

            SPEC_EXCLUSIVE_ARCHES="$(grep -Pom1 '^ExclusiveArch:\s*\K.*' "$COPR_SPEC_FILE" || true)"
            SPEC_BUILD_ARCH="$(grep -Pom1 '^BuildArch:\s*\K[^[:space:]]+' "$COPR_SPEC_FILE" || true)"
            SPEC_IFARCH_ARCHES="$(grep -Po '^%ifarch\s+\K.*' "$COPR_SPEC_FILE" | tr ' ' '\n' | grep -E '^(x86_64|aarch64)$' | sort -u | xargs || true)"

            SPEC_ARCHES="x86_64"
            if [ "$SPEC_BUILD_ARCH" = "noarch" ]; then
              SPEC_ARCHES="x86_64"
            elif [ -n "$SPEC_EXCLUSIVE_ARCHES" ]; then
              SPEC_ARCHES=""
              if [[ "$SPEC_EXCLUSIVE_ARCHES" == *x86_64* ]]; then
                SPEC_ARCHES="${SPEC_ARCHES} x86_64"
              fi
              if [[ "$SPEC_EXCLUSIVE_ARCHES" == *aarch64* ]]; then
                SPEC_ARCHES="${SPEC_ARCHES} aarch64"
              fi
              SPEC_ARCHES="$(xargs <<< "$SPEC_ARCHES")"
            elif [ -n "$SPEC_IFARCH_ARCHES" ]; then
              SPEC_ARCHES="$SPEC_IFARCH_ARCHES"
            fi

            if [ -z "$SPEC_ARCHES" ]; then
              echo "::warning file=$COPR_SPEC_FILE::Could not determine supported chroot architectures from spec file"
              continue
            fi

            CHROOTS=""
            for FEDORA_VERSION in $FEDORA_BUILD_VERSIONS; do
              if ! [[ "$FEDORA_VERSION" =~ ^[0-9]+$ ]]; then
                echo "::error::Invalid Fedora version: ${FEDORA_VERSION}"
                exit 1
              fi
              if [ -n "$MANUAL_FEDORA_VERSIONS" ] && ! grep -qw "$FEDORA_VERSION" <<< "$CONFIGURED_FEDORA_BUILD_VERSIONS"; then
                echo "::error file=$COPR_SPEC_FILE::Fedora ${FEDORA_VERSION} is not configured as a build target for ${COPR_SPEC_FILE}"
                exit 1
              fi

              for SPEC_ARCH in $SPEC_ARCHES; do
                if [ "$FEDORA_VERSION" = "45" ]; then
                  CHROOTS="${CHROOTS} fedora-rawhide-${SPEC_ARCH}"
                else
                  CHROOTS="${CHROOTS} fedora-${FEDORA_VERSION}-${SPEC_ARCH}"
                fi
              done
            done
            CHROOTS="$(xargs <<< "$CHROOTS")"

            INCLUDE_ARRAY=$(echo "$INCLUDE_ARRAY" | jq -c \
              --arg project "$COPR_PROJECT" \
              --arg package "$COPR_PACKAGE_NAME" \
              --arg chroots "$CHROOTS" \
              '. += [{"project": $project, "package": $package, "chroots": $chroots}]')
          done

          echo "::group::Generated build matrix"
          echo "$INCLUDE_ARRAY" | jq .
          echo "::endgroup::"

          MATRIX_JSON=$(jq -cn --argjson include "$INCLUDE_ARRAY" '{"include": $include}')
          echo "matrix=${MATRIX_JSON}" >> "$output_file"
        # yamllint enable rule:line-length
  trigger-package-build:
    needs: matrix_from_changed_specs
    if: needs.matrix_from_changed_specs.outputs.matrix != '{"include":[]}'
    runs-on: codeberg-small
    permissions: {}
    strategy:
      matrix: ${{ fromJson(needs.matrix_from_changed_specs.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Install copr-cli
        run: |
          set -euo pipefail
          echo "::group::Installing system dependencies"
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y python3-dev libkrb5-dev
          else
            apt-get update
            apt-get install -y python3-dev libkrb5-dev
          fi
          echo "::endgroup::"

          echo "::group::Installing COPR CLI dependencies"
          python3 -m pip install copr-cli requests_gssapi
          echo "::endgroup::"
      - name: Configure copr-cli authentication
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          set -euo pipefail
          mkdir -p ~/.config
          touch ~/.config/copr
          chmod 600 ~/.config/copr
          echo "${COPR_CONFIG}" > ~/.config/copr
      - name: Build ${{ matrix.package }}
        # yamllint disable rule:line-length
        env:
          CHROOTS: ${{ matrix.chroots }}
          PACKAGE: ${{ matrix.package }}
          PROJECT: ${{ matrix.project }}
        run: |
          set -euo pipefail
          declare -a CHROOT_ARGS=()
          for CHROOT in ${CHROOTS}; do
            CHROOT_ARGS+=(--chroot "$CHROOT")
          done

          echo "::notice file=${PROJECT}/${PACKAGE}.spec::Building package ${PACKAGE} in project ${PROJECT}"
          copr-cli build-package \
            "${CHROOT_ARGS[@]}" \
            --name "${PACKAGE}" \
            "${COPR_OWNER}/${PROJECT}"
        # yamllint enable rule:line-length
      - name: Cleanup configuration
        if: always()
        run: rm -f ~/.config/copr
